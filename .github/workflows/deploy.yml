name: Deploy

# Manual trigger only — no auto-deploy on push.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (which GitHub Environment's vars/secrets + runner to use)"
        # "environment" type renders a dropdown of the repo's configured
        # GitHub Environments (e.g. production, testing).
        type: environment
        required: true

concurrency:
  # Per-environment, so a testing deploy never blocks a production one.
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    # Each environment has its own VM with a runner labelled both
    # "deploy-runner" and the environment name, so the job lands on the right
    # box. Register runners under Settings -> Actions -> Runners.
    runs-on: [self-hosted, deploy-runner, "${{ inputs.environment }}"]

    # Scopes vars.*/secrets.* (and protection rules) to the chosen environment.
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runtime environment
        shell: bash
        # Map the GitHub Environment name to ASPNETCORE_ENVIRONMENT, capitalizing
        # the first letter (testing -> Testing, production -> Production). Set via
        # $GITHUB_ENV so later steps (and docker compose interpolation) see it.
        run: |
          env_in="${{ inputs.environment }}"
          aspnet="$(printf '%s' "${env_in:0:1}" | tr '[:lower:]' '[:upper:]')${env_in:1}"
          echo "ASPNETCORE_ENVIRONMENT=$aspnet" >> "$GITHUB_ENV"
          echo "Deploying to '$env_in' (ASPNETCORE_ENVIRONMENT=$aspnet)"

      - name: Build & deploy
        shell: bash
        # Secrets are injected as real environment variables (verbatim, never
        # written to disk) and consumed by compose's pass-through env keys. This
        # avoids the .env interpolation that would mangle a "$" in the password.
        # Name + email are non-sensitive -> GitHub Actions variables (vars.*),
        # easy to edit in Settings; the password stays a secret. UseHttps stays
        # true so the backoffice enforces HTTPS via the proxy's forwarded scheme.
        # ASPNETCORE_ENVIRONMENT is inherited from the step above ($GITHUB_ENV).
        env:
          UMBRACO_USE_HTTPS: "true"
          Umbraco__CMS__Unattended__UnattendedUserName: ${{ vars.UMBRACO_ADMIN_NAME || 'Administrator' }}
          Umbraco__CMS__Unattended__UnattendedUserEmail: ${{ vars.UMBRACO_ADMIN_EMAIL }}
          Umbraco__CMS__Unattended__UnattendedUserPassword: ${{ secrets.UMBRACO_ADMIN_PASSWORD }}
        # --wait blocks until the container reports healthy (per the compose
        # healthcheck) and fails the job if it doesn't within the timeout.
        run: docker compose up -d --build --remove-orphans --wait --wait-timeout 240

      - name: Smoke test
        shell: bash
        # Explicit readable gate on top of the healthcheck. The container maps
        # 8080 on the host (the runner), so we hit it locally.
        run: |
          curl -fsS http://localhost:8080/ > /dev/null
          curl -fsS http://localhost:8080/umbraco > /dev/null
          echo "Smoke test passed."

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "::group::docker compose ps"
          docker compose ps
          echo "::endgroup::"
          echo "::group::container logs (last 200 lines)"
          docker compose logs --no-color --tail=200
          echo "::endgroup::"

      - name: Prune dangling images
        if: always()
        shell: bash
        run: docker image prune -f
